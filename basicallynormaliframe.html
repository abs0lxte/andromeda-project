<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti-Close Page - Andromeda 🪐</title>
  <link rel="icon" href="AndromedaLogo.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04040d;
      --panel: rgba(10,11,28,0.92);
      --accent: #6a5cff;
      --text: #dde0ff;
      --text-muted: rgba(200,205,255,0.72);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: radial-gradient(circle at top, rgba(106,92,255,0.15), transparent 32%), #03030a; color: var(--text); font-family: 'Rajdhani', sans-serif; }
    body { display: grid; place-items: center; padding: 24px; }
    .card { width: min(560px,100%); background: var(--panel); border: 1px solid rgba(106,92,255,0.25); border-radius: 24px; padding: 34px; text-align: center; box-shadow: 0 18px 50px rgba(0,0,0,0.35); }
    h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 5vw, 42px); letter-spacing: 2px; margin-bottom: 14px; }
    p { color: var(--text-muted); line-height: 1.8; font-size: 15px; margin-bottom: 20px; }
    .badge { display: inline-flex; padding: 10px 18px; border-radius: 999px; background: rgba(106,92,255,0.16); color: var(--accent); font-size: 13px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Maintenance</span>
    <h1>Anti-Close Tool</h1>
    <p>This page is currently under maintenance. The core Anti-Close feature is offline right now, but the rest of the Andromeda project remains available.</p>
    <p>If you’d like, open <a href="MAIN.html" style="color: var(--accent); text-decoration: none;">MAIN.html</a> or <a href="home.html" style="color: var(--accent); text-decoration: none;">home.html</a> to continue browsing.</p>
  </main>
</body>
</html>
