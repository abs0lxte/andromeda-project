<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Andromeda 🪐</title>
  <link rel="icon" href="AndromedaLogo.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-deep: #04040d;
      --bg-panel: rgba(10,11,28,0.82);
      --bg-hover: rgba(90,80,255,0.13);
      --accent: #6a5cff;
      --accent2: #a78bfa;
      --accent-glow: rgba(106,92,255,0.45);
      --border: rgba(106,92,255,0.22);
      --border-hover: rgba(167,139,250,0.45);
      --text: #dde0ff;
      --text-dim: rgba(200,205,255,0.6);
      --sidebar-w: 220px;
      --sidebar-collapsed: 46px;
      --topbar-h: 50px;
      --tabbar-h: 36px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body, html {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Stars Background ── */
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 70%, rgba(180,170,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 88%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(2px 2px at 70% 60%, rgba(130,110,255,0.1) 0%, transparent 100%);
      pointer-events:none;
      z-index:0;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: var(--topbar-h);
      background: rgba(6,6,18,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      z-index: 1000;
      gap: 12px;
    }

    .topbar-logo {
      width: 26px; height: 26px;
      background: radial-gradient(circle at 40% 40%, #a78bfa, #6a5cff);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-glow);
      flex-shrink: 0;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #b8c0ff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rainbow-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      animation: rainbow 3s linear infinite;
      display: none;
    }
    @keyframes rainbow {
      0%   { color:#ff7f00; }
      14%  { color:#ff5500; }
      28%  { color:#ff2200; }
      42%  { color:#9900cc; }
      57%  { color:#6600ff; }
      71%  { color:#0033ff; }
      85%  { color:#00ffff; }
      100% { color:#ff7f00; }
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100% - var(--topbar-h));
      background: rgba(7,7,20,0.88);
      backdrop-filter: blur(14px);
      border-right: 1px solid var(--border);
      padding: 12px 8px 24px;
      overflow-y: auto;
      overflow-x: hidden;
      display: none;
      transition: width 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 900;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--accent); border-radius:4px; }

    .sidebar.collapsed { width: var(--sidebar-collapsed); }

    /* ── Collapse Arrow ── */
    .collapse-arrow {
      position: fixed;
      top: calc(var(--topbar-h) + 8px);
      left: var(--sidebar-w);
      z-index: 1100;
      width: 20px; height: 20px;
      background: var(--accent);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
      font-size: 9px;
      font-weight: bold;
      transition: left 0.3s cubic-bezier(.4,0,.2,1), background 0.2s;
      box-shadow: 0 0 10px var(--accent-glow);
      user-select: none;
    }
    .collapse-arrow:hover { background: var(--accent2); }
    .sidebar.collapsed ~ .collapse-arrow { left: var(--sidebar-collapsed); }

    /* ── Sidebar Nav Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      padding: 9px 10px;
      margin-bottom: 4px;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-dim);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--border);
      color: var(--text);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .btn.active {
      background: rgba(106,92,255,0.2);
      border-color: var(--border-hover);
      color: #fff;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .btn i {
      margin-right: 10px;
      min-width: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--accent2);
      flex-shrink: 0;
    }
    .btn span { transition: opacity 0.25s; }
    .sidebar.collapsed .btn span { opacity: 0; pointer-events: none; }
    .sidebar.collapsed .btn i { margin-right: 0; }
    .btn:focus { outline: 2px solid rgba(106,92,255,0.5); outline-offset: 2px; }

    .subtab { margin-left: 16px; font-size: 12px; }

    .dropdown { max-height:0; overflow:hidden; transition: max-height 0.35s ease; }
    .dropdown.open { max-height: 500px; }

    .sidebar-section-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(150,140,255,0.4);
      text-transform: uppercase;
      padding: 12px 10px 4px;
    }

    /* ── Tab Bar ── */
    #topTabs {
      position: fixed;
      top: var(--topbar-h);
      left: var(--sidebar-w);
      right: 0;
      height: var(--tabbar-h);
      background: rgba(5,5,16,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 0 6px;
      overflow-x: auto;
      overflow-y: hidden;
      border-bottom: 1px solid var(--border);
      z-index: 950;
      scrollbar-width: none;
      transition: left 0.3s cubic-bezier(.4,0,.2,1);
    }
    #topTabs::-webkit-scrollbar { display: none; }
    .sidebar.collapsed ~ #topTabs { left: var(--sidebar-collapsed); }

    .top-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(106,92,255,0.15);
      padding: 4px 10px;
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      opacity: 0;
      transform: translateY(-6px) scale(0.95);
      min-width: 80px;
      max-width: 160px;
      flex-shrink: 0;
      user-select: none;
    }
    .top-tab.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .top-tab.active {
      background: rgba(106,92,255,0.22);
      border-color: rgba(167,139,250,0.4);
      color: #fff;
      box-shadow: 0 0 10px rgba(106,92,255,0.3);
    }
    .top-tab:hover:not(.active) {
      background: rgba(106,92,255,0.1);
      border-color: rgba(106,92,255,0.3);
      color: var(--text);
    }
    .tab-favicon {
      width: 12px; height: 12px;
      border-radius: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .close-tab {
      width: 14px; height: 14px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: rgba(200,200,255,0.4);
      transition: all 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .close-tab:hover {
      background: rgba(255,80,80,0.2);
      color: #ff6060;
    }

    /* ── Main Content Area ── */
    .content-area {
      position: fixed;
      top: calc(var(--topbar-h) + var(--tabbar-h));
      left: var(--sidebar-w);
      right: 0;
      bottom: 0;
      transition: left 0.3s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.collapsed ~ #topTabs ~ .content-area { left: var(--sidebar-collapsed); }

    iframe {
      width: 100%; height: 100%;
      border: none;
      display: none;
      background: var(--bg-deep);
    }

    /* ── Settings Panel ── */
    .settings {
      width: 100%; height: 100%;
      padding: 28px 32px;
      overflow-y: auto;
      display: none;
      background: transparent;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    .settings.active { display: block; }
    .settings h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--accent2);
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    .settings-group {
      background: rgba(10,11,28,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .settings-group h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(167,139,250,0.6);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
    }
    input[type=text], select {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 7px 10px;
      background: rgba(15,15,35,0.7);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-width: 180px;
    }
    input[type=text]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    button {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      padding: 9px 18px;
      background: rgba(106,92,255,0.15);
      color: var(--accent2);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    button:hover {
      background: rgba(106,92,255,0.3);
      box-shadow: 0 0 18px var(--accent-glow);
      color: #fff;
    }

    /* ── Boot Overlay ── */
    #bootOverlay {
      position: fixed;
      inset: 0;
      background: #04040d;
      color: var(--text-dim);
      font-family: 'Rajdhani', monospace;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 28px 32px;
      z-index: 9999;
      overflow-y: auto;
      caret-color: transparent;
      line-height: 1.8;
    }
    #bootOverlay .boot-line { color: #7b85d4; }
    #bootOverlay .boot-line.ok::after { content: ' [OK]'; color: #5affa0; }
    #bootOverlay.fade-out { animation: fadeOut 0.8s ease forwards; }
    @keyframes fadeOut { to { opacity:0; visibility:hidden; } }

    #andromedaText {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 6px;
      text-shadow:
        0 0 20px var(--accent),
        0 0 40px rgba(106,92,255,0.6),
        0 0 80px rgba(106,92,255,0.3);
      animation: pulsate 2s ease-in-out infinite;
    }
    @keyframes pulsate {
      0%, 100% { text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(106,92,255,0.6); }
      50% { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(106,92,255,0.8), 0 0 100px rgba(106,92,255,0.4); }
    }
    .boot-center { width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:16px; }
    .boot-subtitle { font-family:'Rajdhani',sans-serif; font-size:14px; letter-spacing:4px; color:rgba(167,139,250,0.5); text-transform:uppercase; }
  </style>
</head>

<script>
  // ─── Boot Sequence ───────────────────────────────────────
  const bootOverlay = document.getElementById('bootOverlay');
  bootOverlay.style.caretColor = 'transparent';

  const processes = [
    "Initializing Core Modules...",
    "Loading Kernel...",
    "Checking Hardware...",
    "Initializing CPU Cores...",
    "Loading Drivers...",
    "Loading Graphics Subsystem...",
    "Loading User Interface...",
    "Starting Network Services...",
    "Checking Security Protocols...",
    "Loading Audio Subsystem...",
    "Loading Input Devices...",
    "Starting Methods Engine...",
    "Loading Projects Database...",
    "Initializing Links Module...",
    "Scanning Storage Devices...",
    "Mounting File Systems...",
    "Verifying Integrity...",
    "Loading UI Components...",
    "Starting Background Services...",
    "Initializing Security Modules...",
    "Loading Firewall...",
    "Initializing Logs...",
    "Starting Analytics Engine...",
    "Loading Extensions...",
    "Checking Updates...",
    "Loading Themes...",
    "Applying Settings...",
    "Finalizing Boot Sequence...",
    "Rendering Final UI Layer...",
    "Boot Complete!"
  ];

  let bootIndex = 0;
  function typeProcesses() {
    if (bootIndex < processes.length) {
      const p = document.createElement('div');
      p.className = 'boot-line ok';
      p.textContent = processes[bootIndex];
      bootOverlay.appendChild(p);
      bootIndex++;
      bootOverlay.scrollTop = bootOverlay.scrollHeight;
      setTimeout(typeProcesses, 160);
    } else {
      setTimeout(showWelcome, 400);
    }
  }

  function showWelcome() {
    const p = document.createElement('div');
    p.style.color = '#a78bfa';
    p.style.fontFamily = "'Orbitron', monospace";
    p.style.fontSize = '13px';
    p.textContent = '── Welcome to Andromeda, User ──';
    bootOverlay.appendChild(p);
    bootOverlay.scrollTop = bootOverlay.scrollHeight;
    setTimeout(showAndromedaScreen, 900);
  }

  function showAndromedaScreen() {
    bootOverlay.innerHTML = `
      <div class="boot-center">
        <div id="andromedaText">Andromeda</div>
        <div class="boot-subtitle">Initializing Interface</div>
      </div>`;
    setTimeout(endBoot, 2800);
  }

  function endBoot() {
    bootOverlay.classList.add('fade-out');
    setTimeout(() => {
      bootOverlay.style.display = 'none';
      document.getElementById('sidebar').style.display = 'block';
      document.querySelector('.rainbow-text').style.display = 'block';
      loadPage('home.html', 'Home');
    }, 800);
  }

  setTimeout(typeProcesses, 800);

  // ─── Tab System ──────────────────────────────────────────
  const topTabs = document.getElementById('topTabs');
  const frame   = document.getElementById('frame');
  const tabRegistry = new Map(); // url → tab element

  // Single click: just load into the iframe, no tab created
  function loadPage(url, name) {
    name = name || url.replace('.html','');
    document.getElementById('settings-tab').classList.remove('active');
    // If a tab exists for this url, activate it instead
    if (tabRegistry.has(url)) {
      activateTab(tabRegistry.get(url), url);
      return;
    }
    frame.style.display = 'block';
    frame.src = url;
    topTabs.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
    setActiveTab(url);
  }

  // Double click: create/focus a pinned tab in the tab bar
  function openTab(url, name) {
    name = name || url.replace('.html','');
    document.getElementById('settings-tab').classList.remove('active');
    if (tabRegistry.has(url)) {
      activateTab(tabRegistry.get(url), url);
      return;
    }
    const tab = document.createElement('div');
    tab.classList.add('top-tab');
    tab.innerHTML = `
      <div class="tab-favicon">🪐</div>
      <span class="tab-title">${name}</span>
      <span class="close-tab" title="Close tab">✕</span>`;
    topTabs.appendChild(tab);
    tabRegistry.set(url, tab);
    requestAnimationFrame(() => tab.classList.add('show'));
    tab.addEventListener('click', (e) => {
      if (e.target.classList.contains('close-tab')) return;
      activateTab(tab, url);
    });
    tab.querySelector('.close-tab').addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(tab, url);
    });
    activateTab(tab, url);
  }

  function activateTab(tab, url) {
    topTabs.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    frame.style.display = 'block';
    document.getElementById('settings-tab').classList.remove('active');
    frame.src = url;
    setActiveTab(url);
  }

  function closeTab(tab, url) {
    tab.classList.remove('show');
    tabRegistry.delete(url);
    setTimeout(() => {
      tab.remove();
      const remaining = topTabs.querySelectorAll('.top-tab');
      if (remaining.length > 0) {
        remaining[remaining.length - 1].click();
      } else {
        frame.style.display = 'none';
        frame.src = '';
      }
    }, 200);
  }

  // ─── Load Page ───────────────────────────────────────────
  // Single click: switch to existing tab or just show
  // Double click: OPEN NEW TAB (handled via dblclick on sidebar items)
  // For most buttons we open a tab on single click (normal browser behavior)
  function showSettings() {
    frame.style.display = 'none';
    document.getElementById('settings-tab').classList.add('active');
    topTabs.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
    setActiveTab('settings');
  }

  function toggleMethods() {
    document.getElementById('methodsMenu').classList.toggle('open');
  }
function setActiveTab(id) {
  document.querySelectorAll('.sidebar .btn').forEach(t => t.classList.remove('active'));
  const map = {
    'home':                    'tab-home',
    'projects':                'tab-projects',
    'dashboard':               'tab-dashboard',
    'temp email generator':     'tab-tempemailgenerator',
    'andromeda.html':          'tab-methods-main',
    'abcloaker.html':          'tab-methods-blank',
    'basicallynormaliframe':   'tab-methods-anticlose',
    'tempfilemaker':           'tab-tempfilemaker',
    'andromedamusic':          'tab-music',
    '1klinks':                 'tab-links',
    'credits':                 'tab-credits',
    'Version History':         'tab-version-history',
    'settings':                'tab-settings'
  };
  for (const [key, tabId] of Object.entries(map)) {
    if (id.includes(key)) {
      const el = document.getElementById(tabId);
      if (el) el.classList.add('active');
      break;
    }
  }
}


  // ─── Sidebar Collapse ─────────────────────────────────────
  const sidebar      = document.getElementById('sidebar');
  const collapseArrow = document.getElementById('collapseArrow');
  const contentArea  = document.getElementById('contentArea');
  const topTabsEl    = document.getElementById('topTabs');

  collapseArrow.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    const collapsed = sidebar.classList.contains('collapsed');
    collapseArrow.textContent = collapsed ? '▶' : '◀';
    const w = collapsed ? 'var(--sidebar-collapsed)' : 'var(--sidebar-w)';
    topTabsEl.style.left  = collapsed ? '46px' : '220px';
    contentArea.style.left = collapsed ? '46px' : '220px';
  });

  // ─── Settings ────────────────────────────────────────────
  const panicKeyInput  = document.getElementById('panicKey');
  const panicUrlInput  = document.getElementById('panicUrl');
  const tabCloakSelect = document.getElementById('tabCloak');
  let panicKey = null, panicUrl = null;

  function saveSettings() {
    panicKey = panicKeyInput.value.toUpperCase();
    panicUrl = panicUrlInput.value;
    localStorage.setItem('andromeda_panicKey', panicKey);
    localStorage.setItem('andromeda_panicUrl', panicUrl);
    localStorage.setItem('andromeda_tabCloak', tabCloakSelect.value);
    if (!panicKey || !panicUrl) alert("Panic Key or URL is empty. Panic key won't activate until both are set.");
    applyTabCloak();
  }

  function applyTabCloak() {
    const selected = tabCloakSelect.options[tabCloakSelect.selectedIndex];
    const url      = selected.getAttribute('data-url');
    const favicon  = selected.getAttribute('data-favicon');
    if (url) document.title = selected.text;
    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = favicon ? favicon : 'AndromedaLogo.png';
  }

  window.addEventListener('load', () => {
    panicKeyInput.value  = localStorage.getItem('andromeda_panicKey') || '';
    panicUrlInput.value  = localStorage.getItem('andromeda_panicUrl') || '';
    const saved = localStorage.getItem('andromeda_tabCloak') || 'original';
    tabCloakSelect.value = saved;
    applyTabCloak();
  });

  document.addEventListener('keydown', (e) => {
    if (panicKey && panicUrl && e.key.toUpperCase() === panicKey) {
      window.location.href = panicUrl;
    }
  });

  // ─── Anti-unload ─────────────────────────────────────────
  window.addEventListener('beforeunload', (e) => {
    e.preventDefault();
    e.returnValue = '';
    return '';
  });
</script>
</body>
